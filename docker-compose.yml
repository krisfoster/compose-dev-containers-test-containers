# Docker Compose defines the entire application as a set of named services.
# Running `docker compose up` starts all services together, wired on a shared
# private network — no host-side installs beyond Docker Desktop are needed.
name: whale-runner

services:
  # redis — in-memory data store used by the app for two things:
  #   1. The QR-access window (a short-lived key that expires automatically).
  #   2. The leaderboard (a Redis Stream of player scores).
  # Redis is never exposed to the host; only the app service can reach it, via
  # Docker Compose's built-in service DNS (see REDIS_ADDR in the app service).
  #
  # Docker Hardened Images (DHI): this image is pulled from dhi.io, Docker's
  # registry of hardened base images. DHI images are built from minimal,
  # security-hardened foundations — reduced attack surface, no unnecessary
  # packages. The dhi.io/redis image is a drop-in replacement for redis:alpine.
  #
  # Protected-mode note: DHI Redis ships with protected-mode ON in its bundled
  # redis.conf, which refuses connections from non-loopback addresses. Because
  # Redis has no published port (expose: makes it reachable only on the internal
  # Compose network, not the host), there is no security benefit to protected-mode
  # here. We disable it so the app container can connect without needing a password.
  redis:
    image: dhi.io/redis:8-alpine
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --protected-mode
      - "no"
    # expose: makes port 6379 reachable by other services on the Compose network,
    # but NOT from the host machine. Compare with ports: below, which publishes
    # a port to the host. Redis has no ports: entry because it should only be
    # reachable from inside the stack.
    expose:
      - "6379"

  # app — the Go backend that serves the game, the QR gate, and the leaderboard.
  # It is built from source (app/Dockerfile) rather than pulled from a registry.
  app:
    # Build context is the repo root so app/Dockerfile can COPY frontend/game into
    # the image alongside the Go binary. The resulting image is self-contained —
    # no volume mounts are needed at runtime.
    build:
      context: .
      dockerfile: app/Dockerfile
    image: whale-runner:k8s-local
    environment:
      # REDIS_ADDR uses the service name "redis" as the hostname. Docker Compose
      # gives every service a DNS name matching its key in this file, resolvable
      # by any other service on the same Compose network. This is how containers
      # discover each other without hard-coding IP addresses.
      - REDIS_ADDR=redis:6379
      - GRANT_COOKIE_SECRET=${GRANT_COOKIE_SECRET:-dev-only-change-me}
      - QR_WINDOW_TTL=${QR_WINDOW_TTL:-15m}
      - LEADERBOARD_API_SECRET=${LEADERBOARD_API_SECRET:-dev-only-change-me}
      - NGROK_API_URL=http://ngrok:4040/api/tunnels
      - FRONTEND_DIR=/frontend
      - APP_WEB_PORT=8080
      - APP_GATED_PORT=8081
      - LEADERBOARD_ASSETS_DIR=/leaderboard-assets
      # COMMITS_SERVICE_URL is the browser-visible base URL of the commits microservice.
      # With nginx as the single ingress (014-nginx-front-door), the browser connects
      # to http://localhost (port 80) and nginx proxies /commits/* to commits-service.
      # Override in .env for demo environments (e.g. COMMITS_SERVICE_URL=https://demo.ngrok.app).
      - COMMITS_SERVICE_URL=${COMMITS_SERVICE_URL:-http://localhost}
      # SCORES_SERVICE_URL is the browser-visible base URL of the scores microservice.
      # With nginx as the single ingress (014-nginx-front-door), the browser connects
      # to http://localhost (port 80) and nginx proxies /scores/* to scores-service.
      # Override in .env for demo environments (e.g. SCORES_SERVICE_URL=https://demo.ngrok.app).
      - SCORES_SERVICE_URL=${SCORES_SERVICE_URL:-http://localhost}
    # ports: publishes container port 8080 to the host for direct developer access
    # (e.g. debugging without nginx in the path). The primary public entry point is
    # nginx on port 80. WEB_PORT can be overridden via .env.
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_started
      # When running with --profile public, wait until the ngrok tunnel is
      # established before starting the app. This prevents the QR code endpoint
      # from returning 503 on the very first request after a cold start.
      # Without --profile public the ngrok service does not exist, so this
      # dependency is conditional — Compose ignores depends_on entries for
      # services in inactive profiles.
      ngrok:
        condition: service_healthy
        required: false

  # commits-service — dedicated microservice that serves recent git commits as
  # structured JSON (GET /commits) and a Server-Sent Events stream
  # (GET /commits/stream). It mounts the same read-only .git volume as the
  # app service previously did, reads up to 20 commits from HEAD, and serves
  # no HTML. In normal operation the browser reaches it via nginx at /commits;
  # port 8082 is also published directly for developer access.
  commits-service:
    build:
      context: commits-service
      dockerfile: Dockerfile
    image: whale-runner-commits:local
    environment:
      - GIT_REPO_PATH=/repo
      - COMMITS_LISTEN_ADDR=:8082
    ports:
      - "8082:8082"
    volumes:
      - ./.git:/repo/.git:ro

  # scores-service — dedicated microservice that serves leaderboard standings as
  # structured JSON (GET /scores) and a Server-Sent Events stream
  # (GET /scores/stream). It reads from the leaderboard:scores Redis Stream and
  # subscribes to the leaderboard:score-updated pub/sub channel for live updates.
  # In normal operation the browser reaches it via nginx at /scores; port 8083
  # is also published directly for developer access.
  scores-service:
    build:
      context: scores-service
      dockerfile: Dockerfile
    image: whale-runner-scores:local
    environment:
      - REDIS_ADDR=redis:6379
      - SCORES_LISTEN_ADDR=:8083
      - SCORES_LIMIT=${SCORES_LIMIT:-10}
      - REDIS_PUBSUB_CHANNEL=leaderboard:score-updated
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_started

  # nginx — single public ingress for the demo stack (014-nginx-front-door).
  # Serves game static assets and leaderboard component bundles directly from
  # files copied into the image at build time, and reverse-proxies all dynamic
  # paths to the appropriate Go service or microservice. ngrok tunnels to this
  # service rather than to app:8081 directly, so all external traffic — including
  # QR-gated player phone access — enters through a single port.
  #
  # Build context is the repo root so the Dockerfile can COPY frontend/ alongside
  # the nginx config. See nginx/Dockerfile and nginx/nginx.conf for details.
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: whale-runner-nginx:local
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      app:
        condition: service_started
      scores-service:
        condition: service_started
      commits-service:
        condition: service_started

  # ngrok — creates a secure public tunnel so players can reach the game over the
  # internet using a QR code. ngrok is optional: it only starts when you pass
  # `--profile public` to docker compose. Profiles let you keep optional or
  # environment-specific services in the same compose file without starting them
  # by default.
  #
  # Note: ngrok/ngrok:3 is pulled from Docker Hub, not dhi.io — no hardened
  # equivalent exists. It is only used in this optional demo-mode profile.
  ngrok:
    image: ngrok/ngrok:3
    profiles:
      - public
    restart: unless-stopped
    # ngrok.yml defines the endpoint: static domain and upstream URL (nginx:80,
    # the single public ingress on the Compose network). The authtoken comes from
    # .env so it stays out of the config file and out of version control.
    volumes:
      - ./ngrok.yml:/etc/ngrok/ngrok.yml
    command: ["start", "--all", "--config=/etc/ngrok/ngrok.yml"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    # Healthcheck polls ngrok's local inspection API. Once /api/tunnels returns
    # HTTP 200 the tunnel is established and the app can safely query it for the
    # public URL used to generate QR codes.
    # The ngrok image (Debian-based) has bash but not curl/wget. bash's built-in
    # /dev/tcp lets us make a raw HTTP GET to ngrok's local inspection API and
    # grep the response for "public_url", confirming the tunnel is established.
    # CMD form is used so bash is invoked directly rather than via /bin/sh
    # (which is dash on Debian and does not support /dev/tcp).
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/localhost/4040 &&
          printf 'GET /api/tunnels HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          grep -q public_url <&3
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
