services:
  redis:
    image: dhi.io/redis:8-alpine
    # DHI redis ships a hardened redis.conf with protected-mode ON, which refuses
    # non-loopback connections (i.e. the app container) unless a password is set.
    # redis has no published port here — it's reachable only on the internal compose
    # network — so we disable protected-mode to restore the prior redis:7-alpine
    # behaviour rather than add a password. Keep the hardened conf; just override the flag.
    command: ["redis-server", "/etc/redis/redis.conf", "--protected-mode", "no"]

  app:
    build: ./app
    environment:
      - REDIS_ADDR=redis:6379
      - GRANT_COOKIE_SECRET=${GRANT_COOKIE_SECRET:-dev-only-change-me}
      - QR_WINDOW_TTL=${QR_WINDOW_TTL:-15m}
      - LEADERBOARD_API_SECRET=${LEADERBOARD_API_SECRET:-dev-only-change-me}
      - NGROK_API_URL=http://ngrok:4040/api/tunnels
      - FRONTEND_DIR=/frontend
      - APP_WEB_PORT=8080
      - APP_GATED_PORT=8081
    volumes:
      - ./frontend/game:/frontend:ro
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - redis

  ngrok:
    image: ngrok/ngrok:3
    profiles:
      - public
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: ["http", "app:8081"]
    ports:
      - "4040:4040"
