services:
  webserver:
    image: nginx:alpine
    volumes:
      - ./frontend/game:/usr/share/nginx/html:ro
      - ./webserver/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-8080}:80"

  ngrok:
    image: ngrok/ngrok:3
    profiles:
      - public
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: ["http", "webserver:80"]
    ports:
      - "4040:4040"
