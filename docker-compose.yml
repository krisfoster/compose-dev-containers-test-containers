services:
  redis:
    image: redis:7-alpine

  app:
    build: ./app
    environment:
      - REDIS_ADDR=redis:6379
      - GRANT_COOKIE_SECRET=${GRANT_COOKIE_SECRET:-dev-only-change-me}
      - QR_WINDOW_TTL=${QR_WINDOW_TTL:-15m}
      - NGROK_API_URL=http://ngrok:4040/api/tunnels
      - FRONTEND_DIR=/frontend
      - APP_WEB_PORT=8080
      - APP_GATED_PORT=8081
    volumes:
      - ./frontend/game:/frontend:ro
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - redis

  ngrok:
    image: ngrok/ngrok:3
    profiles:
      - public
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: ["http", "app:8081"]
    ports:
      - "4040:4040"
