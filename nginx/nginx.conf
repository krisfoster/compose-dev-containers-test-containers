events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 80;
        # Static game assets and leaderboard bundles are served from this root.
        root /usr/share/nginx/html;

        # -----------------------------------------------------------------
        # Scores microservice — read path: GET leaderboard standings + SSE
        # live-update stream. Buffering is disabled so each event is flushed
        # immediately to the browser. Score *submission* (POST) is handled by
        # the auth-gated /api/leaderboard/scores location below.
        # -----------------------------------------------------------------
        location /scores {
            proxy_pass http://scores-service:8083;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Commits microservice — REST endpoint + SSE stream
        # Same SSE-safe proxy directives as /scores.
        # -----------------------------------------------------------------
        location /commits {
            proxy_pass http://commits-service:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Local play shortcut — presenter-only route for playing the game on
        # the laptop without scanning the QR code. The Go handler mints a fresh
        # cw_grant cookie (without Secure so it is sent over plain HTTP on
        # localhost) and immediately serves the game page. Set-Cookie is
        # forwarded so the browser receives the grant before the game loads.
        # -----------------------------------------------------------------
        location = /play-local {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        # -----------------------------------------------------------------
        # QR-gated play path — what the ngrok QR code encodes. The Go app's
        # gate.Middleware validates the cw_grant cookie on every request;
        # visitors without a valid grant are redirected to re-scan the QR.
        # Cookie and Set-Cookie are forwarded intact for the gate to operate.
        # -----------------------------------------------------------------
        location = /play {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        # -----------------------------------------------------------------
        # Score submission — gated by auth_request before reaching the scores
        # microservice. nginx validates the cw_grant cookie via the internal
        # /auth/check sub-request; a 401 from that sub-request is returned
        # directly to the client without forwarding to the upstream. The
        # request is rewritten from /api/leaderboard/scores to /scores on
        # scores-service. This more-specific prefix takes precedence over
        # /api/ below.
        # -----------------------------------------------------------------
        location /api/leaderboard/scores {
            auth_request /auth/check;
            proxy_pass http://scores-service:8083/scores;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        # -----------------------------------------------------------------
        # Internal auth-check sub-request target (016-nginx-auth-score-integrity).
        # The "internal" directive prevents direct external access — only
        # nginx auth_request sub-requests can reach this location.
        # -----------------------------------------------------------------
        location = /auth/check {
            internal;
            proxy_pass http://app:8080/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # -----------------------------------------------------------------
        # API routes — ungated Go app (ping and other API paths).
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        # -----------------------------------------------------------------
        # QR code image — dynamic, must not be cached by nginx or the browser.
        # -----------------------------------------------------------------
        location = /qr.png {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            add_header Cache-Control no-store always;
        }

        location = /repo-qr.png {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Leaderboard page — Go template rendering (injects service URLs).
        # -----------------------------------------------------------------
        location = /leaderboard {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Landing page — Getting-Started page rendered inline by the Go app.
        # Exact match so the catch-all below can still serve all other paths.
        # -----------------------------------------------------------------
        location = / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Catch-all — static game assets (JS, CSS, GLB models, audio, images)
        # and leaderboard component bundles under /leaderboard-assets/.
        # Files were copied into the image at build time; return 404 for any
        # path that does not correspond to a real file.
        # -----------------------------------------------------------------
        location / {
            try_files $uri =404;
        }
    }
}
