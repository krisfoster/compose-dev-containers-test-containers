events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 80;
        # Static game assets and leaderboard bundles are served from this root.
        root /usr/share/nginx/html;

        # -----------------------------------------------------------------
        # Scores microservice — REST endpoint + SSE stream
        # Buffering is disabled so each event is flushed immediately to the
        # browser without waiting for the proxy buffer to fill.
        # -----------------------------------------------------------------
        location /scores {
            proxy_pass http://scores-service:8083;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Commits microservice — REST endpoint + SSE stream
        # Same SSE-safe proxy directives as /scores.
        # -----------------------------------------------------------------
        location /commits {
            proxy_pass http://commits-service:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Game play path — routed to the Go app's gated port so the QR gate
        # middleware runs. Cookie and Set-Cookie headers are forwarded intact
        # so the gate can read and write the grant cookie.
        # -----------------------------------------------------------------
        location = /play {
            proxy_pass http://app:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        # -----------------------------------------------------------------
        # Presenter and host-management routes — ungated Go app.
        # /host and /host/rotate are both caught by the /host prefix match.
        # Cookie forwarding is included for session continuity.
        # -----------------------------------------------------------------
        location /host {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        # -----------------------------------------------------------------
        # API routes — ungated Go app (ping, leaderboard score submission).
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        # -----------------------------------------------------------------
        # QR code image — dynamic, must not be cached by nginx or the browser.
        # -----------------------------------------------------------------
        location = /qr.png {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            add_header Cache-Control no-store always;
        }

        location = /repo-qr.png {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Leaderboard page — Go template rendering (injects service URLs).
        # -----------------------------------------------------------------
        location = /leaderboard {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Landing page — Getting-Started page rendered inline by the Go app.
        # Exact match so the catch-all below can still serve all other paths.
        # -----------------------------------------------------------------
        location = / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Catch-all — static game assets (JS, CSS, GLB models, audio, images)
        # and leaderboard component bundles under /leaderboard-assets/.
        # Files were copied into the image at build time; return 404 for any
        # path that does not correspond to a real file.
        # -----------------------------------------------------------------
        location / {
            try_files $uri =404;
        }
    }
}
